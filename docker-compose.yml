services:
  server:
    build: .
    # REQUIRED: avoids 55K iptables rules that OOM a 512MB VPS when mapping
    # the full TCP tunnel port range (10000-65535) via Docker port bindings.
    network_mode: host
    environment:
      - HTN_DOMAIN=tunnel.example.com
      - HTN_EMAIL=admin@example.com
      - HTN_TOKENS=tok_change_me
      - HTN_LISTEN_ADDR=:4443
      - HTN_DNS_PROVIDER=cloudflare
      - HTN_DNS_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - HTN_ADMIN_TOKEN=${HTN_ADMIN_TOKEN}
    volumes:
      - certs:/var/lib/htn-tunnel/certs
    restart: unless-stopped

volumes:
  certs:
